<!doctype html>
<html lang="ru">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="utf-8" />

        <title>Заметки</title>

        <link rel="stylesheet" href="/output.css" />
        <link rel="manifest" href="/manifest.json" />

        <link rel="apple-touch-icon" href="/icons/icon.svg" />
        <link rel="icon" href="/icons/icon.svg" />

        <meta name="mobile-web-app-capable" content="yes" />

        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
    </head>

    <body
        class="antialiased transition ease-in-out min-h-screen bg-neutral-50 dark:bg-neutral-900 text-neutral-900 dark:text-neutral-50 font-mono"
    >
        <header>
            <h1
                class="text-4xl hover:text-melody-blue dark:hover:text-melody-purple"

            </h1>
            <nav>
                <button
                    id="home-button"
                    class="active-button rounded-full px-4 py-2"
                >
                    Главная
                </button>
                <button id="about-button" class="rounded-full px-4 py-2">
                    О приложении
                </button>
            </nav>
        </header>
        <main id="app">
            <!-- placeholder -->
        </main>
        <footer>
            <button id="enable-push" class="bg-green-700">
                Включить уведомления
            </button>
            <button id="disable-push" class="bg-red-700" style="display: none">
                Отключить уведомления
            </button>
        </footer>
        <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
        <script src="/app.js"></script>
    </body>
</html>
